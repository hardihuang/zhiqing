        }
        .game-container { text-align: center; }

            color: #fff; margin-bottom: 10px;

        }
        .instructions { color: #aaa; margin-bottom: 15px; font-size: 14px; }
        .controls {
            display: flex; justify-content: center; gap: 40px;
            margin-bottom: 15px; color: #fff; font-size: 13px;
        }
        .control-group { padding: 10px 20px; border-radius: 8px; background: rgba(255,255,255,0.1); }

        .ice-controls { border: 2px solid #4ecdc4; }

        .message { color: #ffd93d; margin-top: 10px; font-size: 18px; font-weight: bold; }
        .status { color: #aaa; margin-top: 5px; font-size: 12px; }
        .audio-controls { 
            color: #fff; margin-top: 10px; font-size: 13px; 
            display: flex; justify-content: center; gap: 20px;
        }
        .audio-btn {
            background: rgba(255,255,255,0.1); border: 1px solid #666;
            color: #fff; padding: 5px 15px; border-radius: 5px;
            cursor: pointer; font-size: 12px;
        }
        .audio-btn:hover { background: rgba(255,255,255,0.2); }
        .audio-btn.active { background: rgba(100,200,100,0.3); border-color: #4a4; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔥 冰火人 ❄️</h1>
        <div class="instructions">让火人和冰人分别到达对应颜色的门即可过关！</div>

            <div class="control-group ice-controls">

        </div>

            <button class="audio-btn" id="sfxBtn" onclick="toggleSFX()">🔊 音效: 开</button>
        </div>
    </div>

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelNumEl = document.getElementById('levelNum');
        const scoreEl = document.getElementById('score');

        // 音频上下文
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        // 生成音效
        function createTone(freq, type, duration, volume = 0.3) {
            if (!sfxEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // 各种音效
        const sfx = {
            jump: () => createTone(400, 'sine', 0.15, 0.2),
            land: () => createTone(200, 'triangle', 0.1, 0.15),
            push: () => {
                createTone(300, 'sawtooth', 0.1, 0.2);
                setTimeout(() => createTone(400, 'sawtooth', 0.1, 0.2), 50);
            },
            combo: () => {
                [523, 659, 784, 1047].forEach((f, i) => 
                    setTimeout(() => createTone(f, 'square', 0.3, 0.15), i * 100));
            },
            diamond: () => {
                createTone(880, 'sine', 0.1, 0.2);
                setTimeout(() => createTone(1760, 'sine', 0.2, 0.15), 50);
            },
            win: () => {
                [523, 659, 784, 1047, 1319].forEach((f, i) => 
                    setTimeout(() => createTone(f, 'triangle', 0.4, 0.2), i * 150));
            },
            die: () => {
                createTone(200, 'sawtooth', 0.3, 0.3);
                setTimeout(() => createTone(150, 'sawtooth', 0.4, 0.3), 100);
            },
            switch: () => createTone(600, 'square', 0.15, 0.2),
            levelComplete: () => {
                [440, 554, 659, 880].forEach((f, i) => 
                    setTimeout(() => createTone(f, 'triangle', 0.3, 0.2), i * 200));
            }
        };

        // 背景音乐 - 使用Web Audio API生成简单的循环旋律
        let bgmOscillators = [];
        let bgmInterval = null;
        const bgmNotes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66]; // C大调音阶
        
        function playBGM() {
            if (!bgmEnabled || bgmInterval) return;
            let noteIndex = 0;
            bgmInterval = setInterval(() => {
                if (!bgmEnabled) {
                    clearInterval(bgmInterval);
                    bgmInterval = null;
                    return;
                }
                const freq = bgmNotes[noteIndex % bgmNotes.length];
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq / 2; // 低八度
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.8);
                noteIndex++;
            }, 1000);
        }

        function stopBGM() {
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
        }

        function toggleBGM() {
            bgmEnabled = !bgmEnabled;
            document.getElementById('bgmBtn').textContent = bgmEnabled ? '🎵 背景音乐: 开' : '🎵 背景音乐: 关';
            document.getElementById('bgmBtn').classList.toggle('active', bgmEnabled);
            if (bgmEnabled) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                playBGM();
            } else {
                stopBGM();
            }
        }

                platforms: [
                    {x:0,y:550,w:60,h:50},{x:740,y:550,w:60,h:50},
                    {x:100,y:520,w:50,h:20},{x:250,y:500,w:50,h:20},{x:400,y:480,w:50,h:20},{x:550,y:500,w:50,h:20},{x:650,y:520,w:50,h:20},
                    {x:50,y:440,w:40,h:20},{x:150,y:420,w:40,h:20},{x:300,y:400,w:40,h:20},{x:460,y:400,w:40,h:20},{x:610,y:420,w:40,h:20},{x:720,y:440,w:40,h:20},
                    {x:100,y:360,w:40,h:20},{x:250,y:340,w:40,h:20},{x:400,y:320,w:40,h:20},{x:550,y:340,w:40,h:20},{x:650,y:360,w:40,h:20},
                    {x:50,y:280,w:40,h:20},{x:200,y:260,w:40,h:20},{x:350,y:240,w:40,h:20},{x:500,y:240,w:40,h:20},{x:650,y:260,w:40,h:20},{x:720,y:280,w:40,h:20},
                    {x:150,y:200,w:500,h:20},{x:350,y:120,w:100,h:20}
                ],
                firePools: [
                    {x:60,y:530,w:80,h:20},{x:200,y:530,w:50,h:20},{x:350,y:530,w:50,h:20},{x:500,y:530,w:50,h:20},{x:660,y:530,w:80,h:20},
                    {x:90,y:380,w:60,h:20},{x:290,y:380,w:60,h:20},{x:490,y:380,w:60,h:20}
                ],
                icePools: [
                    {x:150,y:530,w:50,h:20},{x:300,y:530,w:50,h:20},{x:450,y:530,w:50,h:20},{x:600,y:530,w:60,h:20},
                    {x:190,y:300,w:60,h:20},{x:390,y:300,w:60,h:20},{x:590,y:300,w:60,h:20}
                ],
                greenPools: [
                    {x:250,y:530,w:50,h:20},{x:400,y:530,w:50,h:20},{x:550,y:530,w:50,h:20},
                    {x:140,y:300,w:50,h:20},{x:340,y:300,w:50,h:20},{x:540,y:300,w:50,h:20}
                ],
                switches: [
                    {x:180,y:180,w:30,h:10,type:'bridge',active:false,targets:[{x:250,y:320,w:50,h:20}]},
                    {x:400,y:180,w:30,h:10,type:'bridge',active:false,targets:[{x:375,y:240,w:50,h:20}]},
                    {x:590,y:180,w:30,h:10,type:'bridge',active:false,targets:[{x:500,y:320,w:50,h:20}]}
                ],
                fireDoor: {x:420,y:80,w:40,h:40}, iceDoor: {x:340,y:80,w:40,h:40},
                diamonds: [
                    {x:125,y:490,c:false},{x:275,y:470,c:false},{x:425,y:450,c:false},{x:575,y:470,c:false},{x:675,y:490,c:false},
                    {x:70,y:410,c:false},{x:170,y:390,c:false},{x:320,y:370,c:false},{x:480,y:370,c:false},{x:630,y:390,c:false},{x:740,y:410,c:false},
                    {x:120,y:330,c:false},{x:270,y:310,c:false},{x:420,y:290,c:false},{x:570,y:310,c:false},{x:670,y:330,c:false},
                    {x:70,y:250,c:false},{x:220,y:230,c:false},{x:370,y:210,c:false},{x:520,y:210,c:false},{x:670,y:230,c:false}
                ]
            }
        ];

        let lvl = levels[0];
        const keys = {};
        const GRAVITY = 0.6, FRICTION = 0.8;

        document.addEventListener('keydown', e => { 
            keys[e.key] = true; 
            keys[e.code] = true;
            if(e.key==='r'||e.key==='R') resetLevel();
            if(e.code==='Space' && fireBoy.pushCooldown <= 0) pushPlayer(fireBoy, iceGirl, 1);
            if(e.key==='Enter' && iceGirl.pushCooldown <= 0) pushPlayer(iceGirl, fireBoy, -1);
        });
        document.addEventListener('keyup', e => { 
            keys[e.key] = false; 
            keys[e.code] = false;
        });

        function resetLevel() {
            lvl = levels[currentLevel-1];
            fireBoy.x = 50; fireBoy.y = 500; fireBoy.vx = 0; fireBoy.vy = 0; 
            fireBoy.reached = false; fireBoy.pushCooldown = 0;
            fireBoy.beingPushed = {x:0, y:0, timer:0};
            iceGirl.x = 100; iceGirl.y = 500; iceGirl.vx = 0; iceGirl.vy = 0; 
            iceGirl.reached = false; iceGirl.pushCooldown = 0;
            iceGirl.beingPushed = {x:0, y:0, timer:0};
            gameWon = false; comboActive = false; comboTimer = 0;
            if(lvl.switches) lvl.switches.forEach(s => s.active = false);
            messageEl.textContent = '按 R 重置关卡 | 空格/Enter 互相推动';
            statusEl.textContent = '';
        }

        // 推动机制
        function pushPlayer(pusher, target, direction) {
            const dist = Math.hypot(pusher.x - target.x, pusher.y - target.y);
            if (dist > 80) {
                statusEl.textContent = '太远了，靠近一点才能推动！';
                setTimeout(() => statusEl.textContent = '', 2000);
                return;
            }
            
            pusher.pushCooldown = 30;
            target.beingPushed = {
                x: direction * 15,
                y: -5,
                timer: 10
            };
            
            // 检查是否触发合体技
            if (dist < 50) {
                activateCombo();
            }
            
            sfx.push();
            statusEl.textContent = pusher === fireBoy ? '火人推了冰人！' : '冰人推了火人！';
            setTimeout(() => statusEl.textContent = '', 1500);
        }

        // 合体技 - 双方获得短暂加速和无敌
        function activateCombo() {
            comboActive = true;
            comboTimer = 180; // 3秒
            sfx.combo();
            statusEl.textContent = '🔥❄️ 合体技激活！无敌加速！';
        }

        function updatePlayer(p, left, right, jump, isFire) {
            const speed = comboActive ? p.speed * 1.5 : p.speed;
            
            // 处理被推动
            if (p.beingPushed.timer > 0) {
                p.vx = p.beingPushed.x;
                p.vy = p.beingPushed.y;
                p.beingPushed.timer--;
            } else {
                // 正常移动
                if (keys[left]) p.vx = -speed;
                else if (keys[right]) p.vx = speed;
                else p.vx *= FRICTION;

                if (keys[jump] && p.onGround) { 
                    p.vy = -p.jump; 
                    p.onGround = false;
                    sfx.jump(); 
                }
            }

            p.vy += GRAVITY;
            p.x += p.vx; 
            p.y += p.vy;
            p.onGround = false;

            // 边界
            if (p.x < 0) p.x = 0;
            if (p.x + p.w > canvas.width) p.x = canvas.width - p.w;

            // 平台碰撞
            let wasOnGround = p.onGround;
            lvl.platforms.forEach(plat => {
                if (p.x < plat.x + plat.w && p.x + p.w > plat.x && 
                    p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h + 20 && p.vy > 0) {
                    p.y = plat.y - p.h; p.vy = 0; p.onGround = true;
                    if (!wasOnGround) sfx.land();
                }
            });

            // 开关检测
            if (lvl.switches) {
                lvl.switches.forEach(sw => {
                    if (p.x + p.w/2 > sw.x && p.x + p.w/2 < sw.x + sw.w &&
                        p.y + p.h > sw.y && p.y < sw.y + sw.h) {
                        if (!sw.active) sfx.switch();
                        sw.active = true;
                    }
                });
            }

            // 危险区域
            if (!comboActive) {
                const allPools = [...lvl.firePools, ...lvl.icePools, ...lvl.greenPools];
                allPools.forEach(pool => {
                    if (p.x + p.w/2 > pool.x && p.x + p.w/2 < pool.x + pool.w && 
                        p.y + p.h > pool.y && p.y < pool.y + pool.h) {
                        if ((isFire && lvl.icePools.includes(pool)) || 
                            (!isFire && lvl.firePools.includes(pool)) || 
                            lvl.greenPools.includes(pool)) {
                            sfx.die();
                            resetLevel(); 
                            messageEl.textContent = '游戏结束！小心危险区域！';
                        }
                    }
                });
            }

            // 宝石收集
            lvl.diamonds.forEach(d => {
                if (!d.c && Math.hypot(p.x+p.w/2-d.x, p.y+p.h/2-d.y) < 20) { 
                    d.c = true; score++; scoreEl.textContent = score; 
                    sfx.diamond();
                }
            });

            // 门检测
            const door = isFire ? lvl.fireDoor : lvl.iceDoor;
            if (p.x + p.w/2 > door.x && p.x + p.w/2 < door.x + door.w && 
                p.y + p.h > door.y && p.y < door.y + door.h) {
                p.reached = true;
            }

            // 冷却
            if (p.pushCooldown > 0) p.pushCooldown--;
        }

        function checkWin() {
            if (fireBoy.reached && iceGirl.reached && !gameWon) {
                gameWon = true;
                sfx.win();
                if (currentLevel < levels.length) {
                    messageEl.textContent = '关卡完成！3秒后进入下一关...';
                    setTimeout(() => { 
                        currentLevel++; 
                        levelNumEl.textContent = currentLevel;
                        sfx.levelComplete();
                        resetLevel(); 
                    }, 3000);
                } else {
                    messageEl.textContent = '🎉 恭喜通关所有关卡！按 R 重新开始';
                }
            }
        }

        // 背景粒子
        let particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * 800,
                y: Math.random() * 600,
                size: Math.random() * 3 + 1,
                speedY: Math.random() * 0.5 + 0.1,
                opacity: Math.random() * 0.5 + 0.1
            });
        }

        function draw() {
            // 动态背景
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            if (comboActive) {
                grad.addColorStop(0,'#4a1a4a'); grad.addColorStop(0.5,'#2e162e'); grad.addColorStop(1,'#1a0a1a');
            } else {
                grad.addColorStop(0,'#1a1a2e'); grad.addColorStop(0.5,'#16213e'); grad.addColorStop(1,'#0f0f1a');
            }
            ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);

            // 绘制背景粒子
            particles.forEach(p => {
                p.y -= p.speedY;
                if (p.y < 0) p.y = 600;
                ctx.fillStyle = comboActive ? 
                    `rgba(255,100,255,${p.opacity})` : 
                    `rgba(100,150,255,${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // 平台
            ctx.fillStyle = '#555';
            lvl.platforms.forEach(p => { 
                ctx.fillRect(p.x,p.y,p.w,p.h); 
                ctx.strokeStyle='#777'; ctx.strokeRect(p.x,p.y,p.w,p.h); 
            });

            // 开关生成的平台
            if (lvl.switches) {
                lvl.switches.forEach(sw => {
                    if (sw.active && sw.targets) {
                        ctx.fillStyle = '#aa0';
                        sw.targets.forEach(t => ctx.fillRect(t.x,t.y,t.w,t.h));
                    }
                    // 绘制开关
                    ctx.fillStyle = sw.active ? '#0f0' : '#666';
                    ctx.fillRect(sw.x, sw.y, sw.w, sw.h);
                });
            }

            // 危险池
            lvl.firePools.forEach(p => { ctx.fillStyle='#ff4444'; ctx.fillRect(p.x,p.y,p.w,p.h); });
            lvl.icePools.forEach(p => { ctx.fillStyle='#44ffff'; ctx.fillRect(p.x,p.y,p.w,p.h); });
            lvl.greenPools.forEach(p => { ctx.fillStyle='#44ff44'; ctx.fillRect(p.x,p.y,p.w,p.h); });

            // 宝石
            lvl.diamonds.forEach(d => {
                if (!d.c) {
                    ctx.fillStyle = comboActive ? '#ff00ff' : '#ffd700';
                    ctx.beginPath();
                    ctx.moveTo(d.x, d.y - 10);
                    ctx.lineTo(d.x + 10, d.y);
                    ctx.lineTo(d.x, d.y + 10);
                    ctx.lineTo(d.x - 10, d.y);
                    ctx.closePath();
                    ctx.fill();
                }
            });

            // 门
            const fd = lvl.fireDoor;
            ctx.fillStyle = fireBoy.reached ? '#ffaa00' : '#ff4444';
            ctx.fillRect(fd.x, fd.y, fd.w, fd.h);
            ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; 
            ctx.fillText('火', fd.x+12, fd.y+25);

            const id = lvl.iceDoor;
            ctx.fillStyle = iceGirl.reached ? '#00aaff' : '#4444ff';
            ctx.fillRect(id.x, id.y, id.w, id.h);
            ctx.fillText('冰', id.x+12, id.y+25);

            // 火人
            ctx.fillStyle = comboActive ? '#ff00ff' : '#ff6b6b';
            ctx.fillRect(fireBoy.x, fireBoy.y, fireBoy.w, fireBoy.h);
            ctx.fillStyle = '#fff'; 
            ctx.fillRect(fireBoy.x+5, fireBoy.y+8, 6, 6); 
            ctx.fillRect(fireBoy.x+19, fireBoy.y+8, 6, 6);
            if (fireBoy.pushCooldown > 0) {
                ctx.fillStyle = '#ff0';
                ctx.fillText('!', fireBoy.x+12, fireBoy.y-5);
            }

            // 冰人
            ctx.fillStyle = comboActive ? '#ff00ff' : '#4ecdc4';
            ctx.fillRect(iceGirl.x, iceGirl.y, iceGirl.w, iceGirl.h);
            ctx.fillStyle = '#fff'; 
            ctx.fillRect(iceGirl.x+5, iceGirl.y+8, 6, 6); 
            ctx.fillRect(iceGirl.x+19, iceGirl.y+8, 6, 6);
            if (iceGirl.pushCooldown > 0) {
                ctx.fillStyle = '#ff0';
                ctx.fillText('!', iceGirl.x+12, iceGirl.y-5);
            }

            // 连线（靠近时）
            const dist = Math.hypot(fireBoy.x - iceGirl.x, fireBoy.y - iceGirl.y);
            if (dist < 80) {
                ctx.strokeStyle = comboActive ? '#f0f' : '#ff0';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(fireBoy.x + fireBoy.w/2, fireBoy.y + fireBoy.h/2);
                ctx.lineTo(iceGirl.x + iceGirl.w/2, iceGirl.y + iceGirl.h/2);
                ctx.stroke();
            }
        }

        function gameLoop() {
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer <= 0) {
                    comboActive = false;
                    statusEl.textContent = '合体技结束';
                    setTimeout(() => statusEl.textContent = '', 1000);
                }
            }
            
            updatePlayer(fireBoy, 'a', 'd', 'w', true);
            updatePlayer(iceGirl, 'ArrowLeft', 'ArrowRight', 'ArrowUp', false);
            checkWin();
            draw();
            requestAnimationFrame(gameLoop);
        }

        resetLevel();
        gameLoop();
    </script>
</body>
</html>
